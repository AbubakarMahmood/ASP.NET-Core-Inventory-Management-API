services:
  postgres:
    image: postgres:16-alpine
    container_name: inventory-postgres
    environment:
      POSTGRES_DB: inventorydb
      POSTGRES_USER: inventoryuser
      POSTGRES_PASSWORD: InventoryPass123!
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - inventory-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inventoryuser -d inventorydb"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: inventory-api
    environment:
      # Development mode: migrations and demo seed data are applied on startup
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=inventorydb;Username=inventoryuser;Password=InventoryPass123!
      - JwtSettings__SecretKey=compose-demo-signing-key-change-for-real-deployments
      - JwtSettings__Issuer=InventoryAPI
      - JwtSettings__Audience=InventoryAPIUsers
      - JwtSettings__ExpiryMinutes=60
      - JwtSettings__RefreshTokenExpiryDays=7
      - DataProtection__KeysPath=/app/data-protection-keys
      - Cors__AllowedOrigins__0=http://localhost:3000
    ports:
      - "5000:8080"
    volumes:
      - dataprotection_keys:/app/data-protection-keys
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - inventory-network
    restart: unless-stopped

  ui:
    build:
      context: .
      dockerfile: Dockerfile.blazor
    container_name: inventory-ui
    ports:
      - "3000:80"
    networks:
      - inventory-network
    restart: unless-stopped
    depends_on:
      - api

networks:
  inventory-network:
    driver: bridge

volumes:
  postgres_data:
  dataprotection_keys:
